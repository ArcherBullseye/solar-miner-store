manifestVersion: 1
id: archerbullseye-store-solar-miner
name: Solar Miner
tagline: Control your Bitcoin miner with solar power
icon: https://raw.githubusercontent.com/ArcherBullseye/solar-miner-store/main/archerbullseye-store-solar-miner/static/icon.svg
category: bitcoin
version: "1.4.6"
port: 3000
description: >-
  Monitor your Solis solar inverter and automatically control your LuxOS
  Bitcoin miner based on battery state of charge.


  Features smart start mode using learned per-hour PV efficiency, weather
  forecasting, Telegram alerts, Luxor pool stats, and live BTC price.
  Fully configurable via the built-in web UI — no config files needed.
developer: ArcherBullseye
website: https://github.com/ArcherBullseye/solar-miner-store
dependencies: []
repo: https://github.com/ArcherBullseye/solar-miner-store
support: https://github.com/ArcherBullseye/solar-miner-store/issues
gallery: []
releaseNotes: >-
  v1.4.6: Fix Smart Start staying IDLE despite sufficient sunny hours. The
  efficiency model only evaluated 8 hourly slots and had no fallback —
  remaining_sunny_hours is now checked as a secondary condition so the
  full remaining day is always considered.
submitter: ArcherBullseye
