gallery: []
releaseNotes: >-
  v1.5.3: Add show/hide eye button to all sensitive fields (Solis API
  secret, dehumidifier local key, Luxor API key, Telegram bot token).
  Also adds autocomplete=new-password to all four fields to prevent
  browser autofill from silently overwriting saved credentials.
