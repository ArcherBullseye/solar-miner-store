gallery: []
releaseNotes: >-
  v1.3.5: Dehumidifier card now shows a 3-pip export indicator below the
  ON/OFF buttons. Red = importing or under 100W export, yellow = 100-500W,
  green = over 500W. Also adds compressor protection (min run/off times)
  and manual override timeout from v1.3.4.
