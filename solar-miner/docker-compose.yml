version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: solar-miner_app_1
      APP_PORT: 3000

  app:
    image: ghcr.io/archerbullseye/solar-miner:latest
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR:-./data}:/app/data
    labels:
      - "umbrel.app-id=solar-miner"
